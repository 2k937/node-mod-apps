<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Node — Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--surface:#111;--sur2:#171717;--border:#2a2a2a;--border2:#333;--muted:#555;--dim:#888;--text:#e8e8e8;--accent:#5865F2}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Space Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:48px 48px}
.card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:52px 44px;max-width:420px;width:100%;text-align:center;position:relative;z-index:1;animation:up .5s ease both;box-shadow:0 32px 64px rgba(0,0,0,.6)}
.logo{width:64px;height:64px;border-radius:12px;background:var(--sur2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
.badge{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
h1{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;color:#fff;margin-bottom:10px}
p{font-size:11px;color:var(--dim);line-height:1.8;margin-bottom:32px}
.role-notice{display:flex;align-items:center;gap:10px;background:var(--sur2);border:1px solid var(--border2);border-left:2px solid var(--accent);border-radius:0 8px 8px 0;padding:12px 16px;margin-bottom:28px;text-align:left}
.role-notice-text{font-size:11px;color:var(--dim);line-height:1.7}
.role-notice-text strong{color:var(--text)}
.role-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(88,101,242,.15);border:1px solid rgba(88,101,242,.3);border-radius:6px;padding:2px 8px;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;color:#7289da;margin-top:4px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;width:100%;background:#5865F2;color:#fff;border:none;border-radius:10px;padding:14px 28px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all .2s;box-shadow:0 4px 20px rgba(88,101,242,.35)}
.btn:hover{background:#4752c4;transform:translateY(-2px);box-shadow:0 8px 32px rgba(88,101,242,.45)}
.error-box{background:rgba(237,66,69,.08);border:1px solid rgba(237,66,69,.25);border-radius:8px;padding:12px 16px;font-size:11px;color:#c07a7a;margin-bottom:20px;display:none}
.error-box.show{display:block}
.note{font-size:10px;color:var(--muted);margin-top:16px;line-height:1.6}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 24 24"><path fill="#7289da" d="M12 2L4 5v6c0 5.25 3.4 10.15 8 11.4C16.6 21.15 20 16.25 20 11V5l-8-3z"/><path fill="#fff" opacity=".9" d="M11 15.5l-3-3 1.4-1.4 1.6 1.6 3.6-3.6L16 10.5l-5 5z"/></svg>
  </div>
  <div class="badge">Node</div>
  <h1>Admin Portal</h1>
  <p>Restricted to staff members with the administrator role. Sign in with Discord to verify your access.</p>
  <div class="role-notice">
    <svg width="18" height="18" viewBox="0 0 24 24" style="flex-shrink:0"><path fill="rgba(88,101,242,.7)" d="M12 2L4 5v6c0 5.25 3.4 10.15 8 11.4C16.6 21.15 20 16.25 20 11V5l-8-3z"/></svg>
    <div class="role-notice-text">
      <strong>Role Required</strong><br>
      You must hold the admin role to access this portal.
      <div class="role-pill">ADMIN_ROLE gated</div>
    </div>
  </div>
  <div class="error-box" id="errorBox"></div>
  <a href="/auth/discord/admin" class="btn">
    <svg width="20" height="20" viewBox="0 0 127.14 96.36"><path fill="currentColor" d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/></svg>
    Sign in with Discord
  </a>
  <p class="note">Only your identity and role membership are requested.</p>
</div>
<script>
const p = new URLSearchParams(location.search);
const box = document.getElementById('errorBox');
const msgs = { no_role:'Access denied — you do not hold the admin role.', not_in_server:'You are not a member of the Node server.', error:'Authentication error — please try again.', denied:'Sign-in was cancelled.' };
const msg = msgs[p.get('auth')];
if (msg) { box.textContent = msg; box.classList.add('show'); }
</script>
</body>
</html>
